<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交流会用1on1マッチング</title>

    <link rel="icon" href="assets/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>交流会用1on1マッチング</h1>
    <div id="controls" class="collapsible">
        <form id="match-form">
            <label>参加者名:<br></label>
            <div id="names-list"></div>
            <button type="button" id="add-name">入力枠を追加</button>
            <label>対戦回数:<br>
                <input type="number" id="rounds" min="1" value="1">
            </label><br><br>
            <button type="submit">マッチング生成</button>
        </form>
        <button type="button" id="close-controls" class="open-controls" style="display:none">設定を閉じる</button>
    </div>
    <button type="button" id="open-controls" class="open-controls" style="display:none">設定を開く</button>
    <h3>マッチング結果</h3>
    <div id="result"></div>
    <div style="margin-top:0.8em">
        <button type="button" id="share-result" style="display:none">結果を共有(β)</button>
    </div>
    <script src="main.js"></script>
</body>

</html>
